name: YT-AI-Blog CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Cancels redundant in-progress runs on the same PR to save compute minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-security:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install Linting & Security Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff bandit

      - name: Format & Lint Code (Ruff)
        # Ruff replaces Black, Flake8, and isort. It is 10-100x faster.
        run: |
          ruff format --check .
          ruff check .

      - name: Security Scan (Bandit)
        run: bandit -r . -ll -ii -x "venv,env,tests"

  test:
    name: Run Django Tests (Python ${{ matrix.python-version }})
    needs: lint-and-security
    runs-on: ubuntu-latest
    
    # Run tests on multiple Python versions to guarantee compatibility
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
      fail-fast: false
    
    env:
      DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY || 'ci-dummy-django-secret-key' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'ci-dummy-gemini-key' }}
      ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY || 'ci-dummy-assemblyai-key' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage

      - name: Check Database Migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run Tests with Coverage
        run: |
          coverage run manage.py test
          coverage report -m
          coverage xml

      - name: Upload Coverage Report
        # Only upload coverage once (from the 3.11 run) to avoid clutter
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
