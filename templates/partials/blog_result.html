<div id="resultCard" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden opacity-0 transition-opacity duration-500">
    <div class="bg-slate-50 border-b border-slate-200 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-3 overflow-hidden">
            <div class="bg-green-100 text-green-700 p-2 rounded-lg flex-shrink-0">
                <i class="fa-solid fa-check"></i>
            </div>
            <h2 class="text-lg font-semibold text-slate-900 truncate">{{ title }}</h2>
        </div>
        
        <button id="copyBtn" class="text-slate-500 hover:text-primary-600 hover:bg-primary-50 px-3 py-2 rounded-lg transition-colors flex items-center gap-2 text-sm font-medium border border-transparent hover:border-primary-200">
            <i class="fa-regular fa-copy"></i>
            <span id="copyText">Copy</span>
        </button>
    </div>
    
    <div class="p-6 sm:p-8">
        <article id="blogContent" class="prose prose-slate prose-primary max-w-none prose-headings:font-semibold prose-a:text-primary-600 hover:prose-a:text-primary-500 prose-img:rounded-xl"></article>
    </div>

    <div id="rawMarkdown" class="hidden">{{ content }}</div>
</div>
